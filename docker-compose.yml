version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - ALIBABA_OSS_ACCESS_KEY_ID=${ALIBABA_OSS_ACCESS_KEY_ID}
      - ALIBABA_OSS_ACCESS_KEY_SECRET=${ALIBABA_OSS_ACCESS_KEY_SECRET}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=meeting_user
      - POSTGRES_PASSWORD=meeting_pass
      - POSTGRES_DB=meeting_advisor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
